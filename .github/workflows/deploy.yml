name: Deploy Discord Bot

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: self-hosted
    env:
      BOT_DIR: F:\git\ponzu-sababot\bot
    steps:
      - name: Pull latest code
        working-directory: ${{ env.BOT_DIR }}
        run: git pull origin main

      - name: Install dependencies
        working-directory: ${{ env.BOT_DIR }}
        run: npm ci

      - name: Type check
        working-directory: ${{ env.BOT_DIR }}
        run: npm run typecheck

      - name: Deploy commands
        working-directory: ${{ env.BOT_DIR }}
        run: npm run deploy

      - name: Restart Bot with PM2
        working-directory: ${{ env.BOT_DIR }}
        run: pm2 restart ecosystem.config.cjs --env production || pm2 start ecosystem.config.cjs --env production
