name: Deploy Discord Bot

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: self-hosted
    env:
      BOT_DIR: F:\git\ponzu-sababot\bot
    steps:
      - name: Pull latest code
        working-directory: ${{ env.BOT_DIR }}
        run: git pull origin main

      - name: Stop Bot (release file locks)
        continue-on-error: true
        run: pm2 stop ponzubot
        shell: powershell

      - name: Wait for process cleanup
        run: Start-Sleep -Seconds 3
        shell: powershell

      - name: Install dependencies
        working-directory: ${{ env.BOT_DIR }}
        run: npm install --ignore-scripts

      - name: Type check
        working-directory: ${{ env.BOT_DIR }}
        run: npm run typecheck

      - name: Deploy commands
        working-directory: ${{ env.BOT_DIR }}
        run: npm run deploy

      - name: Start Bot
        working-directory: ${{ env.BOT_DIR }}
        run: pm2 restart ecosystem.config.cjs --env production
